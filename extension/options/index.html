<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AllFans 数据展厅</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="options-shell">
    <div class="options-noise"></div>

    <header class="options-hero">
      <div class="hero-copy">
        <p class="options-kicker">AllFans Data Studio</p>
        <h1>数据展厅</h1>
      </div>
      <div class="hero-actions">
        <button id="refreshOptionsBtn" class="ghost-button" type="button">刷新数据</button>
      </div>
    </header>

    <main class="options-main">
      <section class="options-panel spotlight-panel">
        <div class="panel-head">
          <div>
            <p class="options-kicker">Overview</p>
            <h2>全局指标</h2>
          </div>
        </div>

        <div class="overview-grid">
          <div class="overview-card">
            <span class="overview-label">总粉丝</span>
            <strong class="overview-value" id="overviewTotalFans">0</strong>
          </div>
          <div class="overview-card">
            <span class="overview-label">总播放</span>
            <strong class="overview-value" id="overviewTotalPlayCount">0</strong>
          </div>
          <div class="overview-card">
            <span class="overview-label">总点赞</span>
            <strong class="overview-value" id="overviewTotalLikeCount">0</strong>
          </div>
          <div class="overview-card">
            <span class="overview-label">已启用平台</span>
            <strong class="overview-value" id="enabledPlatformCount">0</strong>
          </div>
          <div class="overview-card">
            <span class="overview-label">已开启汇总</span>
            <strong class="overview-value" id="summaryPlatformCount">0</strong>
          </div>
          <div class="hero-platform-card">
            <span class="hero-platform-label">当前领跑平台</span>
            <strong id="heroPlatformName">等待同步</strong>
            <span id="heroPlatformMeta">同步后自动识别</span>
          </div>
          <div class="overview-card">
            <span class="overview-label">最近同步</span>
            <strong class="overview-value is-compact" id="overviewLastUpdate">等待同步</strong>
          </div>
        </div>
      </section>

      <section class="dashboard-layout">
        <section class="options-panel workbench-panel">
          <div class="board-studio-grid">
            <div class="board-preview-column">
              <div class="panel-head">
                <div>
                  <p class="options-kicker">Board Studio</p>
                  <h2>看板预览</h2>
                </div>
              </div>

              <div class="dashboard-preview-shell">
                <div id="dashboardPreview" class="dashboard-preview" aria-live="polite"></div>
              </div>
            </div>

            <div class="board-config-column">
              <div class="dashboard-output-card">
                <div class="meta-block ratio-control-block">
                  <span class="meta-label">画布比例</span>
                  <select id="dashboardRatioSelect" class="meta-select">
                    <option value="square">方版 1:1</option>
                    <option value="landscape">横版 16:9</option>
                    <option value="story">竖版 9:16</option>
                  </select>
                </div>

                <div class="meta-block size-control-block">
                  <span class="meta-label">导出尺寸</span>
                  <div class="size-control-row">
                    <select id="dashboardSizeSelect" class="meta-select">
                      <option value="standard">标准</option>
                      <option value="fhd">1080p</option>
                      <option value="qhd">2K</option>
                      <option value="uhd">4K</option>
                    </select>
                    <strong id="dashboardPresetSize" class="preset-size-text">1200 × 1200</strong>
                  </div>
                  <strong id="dashboardPresetHint" class="preset-hint-text">适合汇报封面、网页横幅、投屏展示</strong>
                </div>

                <div class="meta-block dashboard-export-card is-primary-export">
                  <span class="meta-label">导出格式</span>
                  <div class="export-select-row">
                    <select id="dashboardExportFormatSelect" class="meta-select">
                      <option value="png">PNG</option>
                      <option value="jpg">JPG</option>
                      <option value="svg">SVG</option>
                      <option value="json">JSON</option>
                      <option value="excel">Excel</option>
                    </select>
                    <button class="export-button compact-export-button" type="button" data-export-format>导出</button>
                  </div>
                </div>
              </div>

              <label class="dashboard-title-card">
                <span class="meta-label">图片标题</span>
                <input id="dashboardTitleInput" type="text" maxlength="24" placeholder="默认标题：全平台经营总览">
              </label>

              <div class="dashboard-account-card">
                <label class="account-name-control">
                  <span class="meta-label">账号名称</span>
                  <input id="dashboardAccountNameInput" type="text" maxlength="18" placeholder="默认显示 AllFans">
                </label>
                <label class="account-avatar-control">
                  <span class="meta-label">账号头像</span>
                  <input id="dashboardAvatarImageInput" type="file" accept="image/*">
                </label>
                <button id="clearDashboardAvatarBtn" class="mini-button" type="button">清除头像</button>
              </div>

              <div class="dashboard-module-card">
                <span class="meta-label">导出模块</span>
                <div class="dashboard-module-grid" id="dashboardModuleControls">
                  <label><input type="checkbox" data-dashboard-module="account" checked>账号模块</label>
                  <label><input type="checkbox" data-dashboard-module="hero" checked>领跑平台</label>
                  <label><input type="checkbox" data-dashboard-module="summary" checked>指标卡片</label>
                  <label><input type="checkbox" data-dashboard-module="fanShare" checked>粉丝占比</label>
                  <label><input type="checkbox" data-dashboard-module="topPlays" checked>播放排行</label>
                  <label><input type="checkbox" data-dashboard-module="interactionMix" checked>互动结构</label>
                </div>
              </div>

              <div class="dashboard-theme-card">
                <label class="theme-color-control">
                  <span class="meta-label">主题颜色</span>
                  <input id="dashboardThemeColorInput" type="color" value="#FFBE82">
                </label>
                <label class="theme-file-control">
                  <span class="meta-label">背景图片 <span class="info-tip" tabindex="0" aria-label="建议使用当前画布比例的背景图，导出时会自动铺满并居中裁切。">!</span></span>
                  <input id="dashboardBackgroundImageInput" type="file" accept="image/*">
                </label>
                <label class="theme-opacity-control">
                  <span class="meta-label">默认背景透明度 <strong id="dashboardDefaultBackgroundOpacityValue">100%</strong></span>
                  <input id="dashboardDefaultBackgroundOpacityInput" type="range" min="0" max="100" step="5" value="100">
                </label>
                <label class="theme-opacity-control">
                  <span class="meta-label">自定义背景透明度 <strong id="dashboardBackgroundOpacityValue">58%</strong></span>
                  <input id="dashboardBackgroundOpacityInput" type="range" min="0" max="100" step="5" value="58">
                </label>
                <button id="clearDashboardBackgroundBtn" class="mini-button" type="button">清除背景图</button>
              </div>
            </div>
          </div>
        </section>
      </section>

      <section class="options-panel">
        <div class="panel-head">
          <div>
            <p class="options-kicker">Platform Radar</p>
            <h2>平台亮点</h2>
          </div>
        </div>
        <div id="platformInsightList" class="platform-insight-grid"></div>
      </section>

      <section class="settings-layout">
      <section class="options-panel platform-settings-panel">
        <div class="panel-head">
          <div>
            <p class="options-kicker">Platforms</p>
            <h2>平台策略</h2>
          </div>
        </div>
        <div class="platform-settings-head">
          <span>平台</span>
          <span>显示</span>
          <span>同步</span>
          <span>汇总</span>
        </div>
        <div id="platformSettingsList"></div>
      </section>

      <section class="options-panel system-settings-panel">
        <div class="panel-head">
          <div>
            <p class="options-kicker">System</p>
            <h2>运行设置</h2>
          </div>
        </div>

        <div class="toggle-grid">
          <label class="toggle-card">
            <input type="checkbox" id="autoUpdateSetting">
            <span class="toggle-copy">
              <strong>每日自动同步</strong>
              <span>浏览器运行时按日触发全部已开启平台的同步任务。</span>
            </span>
          </label>
          <label class="toggle-card">
            <input type="checkbox" id="externalApiEnabledSetting">
            <span class="toggle-copy">
              <strong>允许本地只读访问</strong>
              <span>将缓存中的汇总数据开放给本机面板或脚本读取，不允许远程写入。</span>
            </span>
          </label>
          <label class="toggle-card">
            <input type="checkbox" id="localBridgeEnabledSetting">
            <span class="toggle-copy">
              <strong>启用本地桥接</strong>
              <span>把最新快照主动推送到本地服务端口，方便二次消费。</span>
            </span>
          </label>
        </div>

        <label class="field-card">
          <span class="field-label">本地桥接地址</span>
          <input type="text" id="localBridgeEndpointSetting" spellcheck="false" placeholder="http://127.0.0.1:8765">
        </label>

        <div class="bridge-status" id="localBridgeStatus"></div>
      </section>
      </section>
    </main>

    <footer class="options-footer">
      <div class="feedback" id="feedback" hidden></div>
      <div class="footer-actions">
        <button id="saveSettingsBtn" class="save-button" type="button">保存设置</button>
      </div>
    </footer>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
