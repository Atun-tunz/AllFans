<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AllFans 数据概览</title>
  <link rel="stylesheet" href="app.css">
  <link rel="stylesheet" href="animations.css">
</head>
<body>
  <div class="shell">
    <div class="noise"></div>
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>

    <header class="hero">
      <button id="heroOptionsLink" class="hero-copy hero-options-link" type="button" aria-label="打开数据展厅">
        <p class="eyebrow">Creator Pulseboard</p>
        <h1>AllFans</h1>
        <p class="hero-subtitle">看看全网有多少人发现了宝藏</p>
      </button>

      <div class="hero-summary">
        <div class="summary-card gold">
          <span class="summary-label">总粉丝</span>
          <span class="summary-value" id="totalFans">0</span>
        </div>
        <div class="summary-card amber">
          <span class="summary-label">总观看</span>
          <span class="summary-value" id="totalPlayCount">0</span>
        </div>
        <div class="summary-card hot">
          <span class="summary-label">总点赞</span>
          <span class="summary-value" id="totalLikeCount">0</span>
        </div>
        <div class="summary-card">
          <span class="summary-label">启用平台</span>
          <span class="summary-value" id="activePlatformCount">0</span>
        </div>
      </div>
    </header>

    <main class="content">
      <section class="platform-stage">
        <div class="panel-head platform-stage-head">
          <div>
            <p class="platform-kicker">Platforms</p>
            <h2 class="panel-title">平台概览</h2>
          </div>
        </div>
        <div id="platformList" class="platform-list"></div>
      </section>
    </main>

    <footer class="footer">
      <div class="feedback" id="feedback" hidden></div>

      <div class="actions actions-footer">
        <button id="syncAllBtn" class="btn btn-primary sync-all-button" type="button">一键全网</button>
        <button id="clearCacheBtn" class="btn btn-secondary clear-cache-button" type="button">清理缓存</button>
      </div>
    </footer>

    <section class="panel settings-launch" id="settingsLaunchCard">
      <div class="panel-head">
        <div>
          <p class="platform-kicker">Settings</p>
          <h2 class="panel-title">数据展厅</h2>
        </div>
        <button id="openOptionsBtn" class="btn btn-secondary settings-open-button" type="button">
          打开展厅
        </button>
      </div>
    </section>
    <div class="skeleton-loader" id="skeletonLoader" style="display: none;">
      <div class="skeleton skeleton-hero">
        <div class="skeleton-line skeleton-line-lg"></div>
        <div class="skeleton-line skeleton-line-md"></div>
      </div>
      <div class="skeleton-grid">
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
      </div>
      <div class="skeleton skeleton-button"></div>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
